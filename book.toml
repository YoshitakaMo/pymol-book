[book]
authors = ["Yoshitaka Moriwaki"]
src = "src"
title = "pymol-book"

[output.html]
smart-punctuation = true
mathjax-support = true
theme = "src/theme"

[output.html.search]
limit-results = 20
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = false
heading-split-level = 2